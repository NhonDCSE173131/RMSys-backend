spring:
  application:
    name: manufacturing-monitor
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:sqlserver}

  jpa:
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

server:
  port: 8080
  servlet:
    context-path: /

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha

app:
  connection:
    watchdog-interval-ms: 3000
    stale-threshold-sec: 10
    offline-threshold-sec: 30
    flap-window-sec: 60
    unstable-flap-threshold: 3
  realtime:
    sse-timeout-ms: 300000
    replay-buffer-size: 500
    telemetry-throttle-enabled: true
    heartbeat-enabled: true
    heartbeat-interval-ms: 1000
  aggregation:
    realtime-interval-ms: 1000
    realtime-window-sec: 60
    default-sample-sec: 1
    interval-ms: 60000
  ingest:
    api-key: ${APP_INGEST_API_KEY:}
