spring:
  datasource:
    url: jdbc:sqlserver://localhost:1433;databaseName=rmsys;encrypt=false;trustServerCertificate=true
    username: sa
    password: 123
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5

  jpa:
    hibernate:
      ddl-auto: update

  flyway:
    enabled: true
    locations: classpath:db/migration/sqlserver
    baseline-on-migrate: true

